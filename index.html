
<h2 class="sr-only">/giveジェネレーター(1.20.5以降) あずき作</h2>

<style>
select { background: var(--color-background-primary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 8px; font-size: 13px; cursor: pointer; }
.lore-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; margin-bottom: 6px; }
.lore-row input[type=text] { width: 100%; box-sizing: border-box; }
.cmd-type-btn { font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; text-align: left; }
.cmd-type-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
</style>

<div style="padding: 1rem 0;">

<div style="margin-bottom: 12px;">
  <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">コマンド形式</label>
  <div style="display: flex; flex-direction: column; gap: 6px;" id="cmd-type-btns"></div>
</div>

<div style="margin-bottom: 12px;">
  <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">プレイヤー名</label>
  <input type="text" id="player-input" placeholder="例: _azq" style="width: 100%; box-sizing: border-box;" />
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
  <div>
    <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">アイテムID</label>
    <input type="text" id="itemid" placeholder="例: diamond_sword" style="width: 100%; box-sizing: border-box;" />
  </div>
  <div>
    <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">個数</label>
    <input type="number" id="count" value="1" min="1" max="64" style="width: 100%; box-sizing: border-box;" />
  </div>
</div>

<div style="margin-bottom: 12px;">
  <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">カスタム名（custom_name）</label>
  <input type="text" id="itemname" placeholder="空欄でデフォルト名" style="width: 100%; box-sizing: border-box;" />
</div>

<div style="margin-bottom: 12px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
    <label style="font-size: 13px; color: var(--color-text-secondary);">詳細テキスト（Lore）</label>
    <button id="add-lore-btn" style="font-size: 12px; padding: 4px 10px;">+ 行を追加</button>
  </div>
  <div id="lore-lines"></div>
</div>

<div id="error-msg" style="display: none; font-size: 13px; color: var(--color-text-danger); margin-bottom: 8px;"></div>

<button onclick="generate()" style="width: 100%; padding: 10px; font-size: 15px; font-weight: 500; margin-bottom: 16px;">コマンドを生成</button>

<div id="output-area" style="display: none;">
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 8px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <span style="font-size: 13px; color: var(--color-text-secondary);">生成されたコマンド</span>
      <button id="copy-btn" style="font-size: 12px; padding: 4px 10px;">コピー</button>
    </div>
    <code id="cmd-output" style="font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); word-break: break-all; white-space: pre-wrap; display: block;"></code>
  </div>
  <div style="background: #1a1a2e; border-radius: var(--border-radius-md); padding: 14px 16px;">
    <div style="font-size: 11px; color: #888; margin-bottom: 8px;">プレビュー</div>
    <div id="mc-preview" style="font-family: 'Courier New', monospace;"></div>
  </div>
</div>

</div>

<script>
const CMD_TYPES = [
  { label: '/give（シングルプレイまたはバニラサーバーの場合はこちら）', value: 'give' },
  { label: '/minecraft:give（EssentialsXの場合はこちら）', value: 'minecraft_give' },
];

let selectedCmdType = 'give';

function renderCmdTypeBtns() {
  const c = document.getElementById('cmd-type-btns');
  c.innerHTML = '';
  CMD_TYPES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'cmd-type-btn' + (t.value === selectedCmdType ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => { selectedCmdType = t.value; renderCmdTypeBtns(); };
    c.appendChild(btn);
  });
}

let loreIdx = 0;
function addLore(val) {
  loreIdx++;
  const row = document.createElement('div');
  row.className = 'lore-row';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'lore-text';
  inp.placeholder = loreIdx + '行目';
  inp.value = val || '';

  const del = document.createElement('button');
  del.textContent = '✕';
  del.style.cssText = 'font-size: 12px; padding: 4px 8px; color: var(--color-text-secondary);';
  del.onclick = () => row.remove();

  row.appendChild(inp);
  row.appendChild(del);
  document.getElementById('lore-lines').appendChild(row);
}

document.getElementById('add-lore-btn').onclick = () => addLore('');

document.getElementById('copy-btn').onclick = () => {
  navigator.clipboard.writeText(document.getElementById('cmd-output').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'コピー完了!';
    setTimeout(() => btn.textContent = 'コピー', 1500);
  });
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function generate() {
  const player = document.getElementById('player-input').value.trim();
  const item = document.getElementById('itemid').value.trim();
  if (!player) { showError('プレイヤー名を入力してください'); return; }
  if (!item) { showError('アイテムIDを入力してください'); return; }
  showError('');

  const count = parseInt(document.getElementById('count').value) || 1;
  const name = document.getElementById('itemname').value.trim();
  const lores = [...document.querySelectorAll('.lore-text')]
    .map(i => i.value.trim())
    .filter(v => v);

  const components = [];
  if (name) components.push(`custom_name='${name}'`);
  if (lores.length > 0) {
    components.push(`lore=[${lores.map(l => `'${l}'`).join(',')}]`);
  }

  const comp = components.length ? `[${components.join(',')}]` : '';
  const prefix = selectedCmdType === 'minecraft_give' ? '/minecraft:give' : '/give';
  const cmd = `${prefix} ${player} ${item}${comp} ${count}`;
  document.getElementById('cmd-output').textContent = cmd;

  const prev = document.getElementById('mc-preview');
  prev.innerHTML = '';
  const nd = document.createElement('div');
  nd.style.cssText = 'font-size:14px;font-weight:bold;color:#ffffff;margin-bottom:4px;';
  nd.textContent = name || item.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  prev.appendChild(nd);
  lores.forEach(l => {
    const ld = document.createElement('div');
    ld.style.cssText = 'font-size:13px;color:#AA00AA;font-style:italic;';
    ld.textContent = l;
    prev.appendChild(ld);
  });

  document.getElementById('output-area').style.display = 'block';
}

renderCmdTypeBtns();
</script>
