
<h2 class="sr-only">Minecraftの詳細付きアイテム /give コマンドジェネレーター</h2>

<style>
select { background: var(--color-background-primary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 8px; font-size: 13px; cursor: pointer; }
.lore-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 6px; align-items: center; margin-bottom: 6px; }
.lore-row input[type=text] { width: 100%; box-sizing: border-box; }
#generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>

<div style="padding: 1rem 0;">

<div style="margin-bottom: 12px;">
  <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">プレイヤー名</label>
  <input type="text" id="player-input" placeholder="プレイヤー名を入力（例: _azq）" style="width: 100%; box-sizing: border-box;" />
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
  <div>
    <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">アイテムID</label>
    <input type="text" id="itemid" placeholder="例: minecraft:diamond_sword" style="width: 100%; box-sizing: border-box;" />
  </div>
  <div>
    <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">個数</label>
    <input type="number" id="count" value="1" min="1" max="64" style="width: 100%; box-sizing: border-box;" />
  </div>
</div>

<div style="margin-bottom: 12px;">
  <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">カスタム名（custom_name）</label>
  <input type="text" id="itemname" placeholder="空欄でデフォルト名" style="width: 100%; box-sizing: border-box; margin-bottom: 6px;" />
  <div style="display: flex; gap: 12px; align-items: center;">
    <div id="name-color-wrap"></div>
    <label style="font-size: 13px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 4px; cursor: pointer;">
      <input type="checkbox" id="name-italic" /> イタリック
    </label>
  </div>
</div>

<div style="margin-bottom: 12px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
    <label style="font-size: 13px; color: var(--color-text-secondary);">詳細テキスト（Lore）</label>
    <button id="add-lore-btn" style="font-size: 12px; padding: 4px 10px;">+ 行を追加</button>
  </div>
  <div id="lore-lines"></div>
</div>

<div id="error-msg" style="display: none; font-size: 13px; color: var(--color-text-danger); margin-bottom: 8px;"></div>

<button id="generate-btn" onclick="generate()" style="width: 100%; padding: 10px; font-size: 15px; font-weight: 500; margin-bottom: 16px;">コマンドを生成</button>

<div id="output-area" style="display: none;">
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 8px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <span style="font-size: 13px; color: var(--color-text-secondary);">生成されたコマンド</span>
      <button id="copy-btn" style="font-size: 12px; padding: 4px 10px;">コピー</button>
    </div>
    <code id="cmd-output" style="font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); word-break: break-all; white-space: pre-wrap; display: block;"></code>
  </div>
  <div style="background: #1a1a2e; border-radius: var(--border-radius-md); padding: 14px 16px;">
    <div style="font-size: 11px; color: #888; margin-bottom: 8px;">プレビュー</div>
    <div id="mc-preview" style="font-family: 'Courier New', monospace;"></div>
  </div>
</div>

</div>

<script>
const MC_COLORS = {
  white:'#ffffff', yellow:'#FFFF55', gold:'#FFAA00', aqua:'#55FFFF',
  blue:'#5555FF', light_purple:'#FF55FF', dark_purple:'#AA00AA',
  green:'#55FF55', dark_green:'#00AA00', red:'#FF5555',
  dark_red:'#AA0000', gray:'#AAAAAA', dark_gray:'#555555'
};

const COLOR_OPTIONS = [
  ['dark_purple','紫'],['light_purple','明紫'],['white','白'],
  ['yellow','黄'],['gold','金'],['aqua','水色'],['gray','灰']
];
const NAME_COLOR_OPTIONS = [
  ['','色なし'],['white','白'],['yellow','黄'],['gold','金'],['aqua','水色'],
  ['blue','青'],['light_purple','明るい紫'],['dark_purple','紫'],
  ['green','緑'],['dark_green','暗い緑'],['red','赤'],
  ['dark_red','暗い赤'],['gray','灰'],['dark_gray','暗い灰']
];

function makeSelect(options, selectedVal) {
  const sel = document.createElement('select');
  options.forEach(([v, label]) => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = label;
    if (v === selectedVal) opt.selected = true;
    sel.appendChild(opt);
  });
  return sel;
}

const nameColorSel = makeSelect(NAME_COLOR_OPTIONS, '');
document.getElementById('name-color-wrap').appendChild(nameColorSel);

let loreIdx = 0;
function addLore(val, colorVal, italicVal) {
  loreIdx++;
  const row = document.createElement('div');
  row.className = 'lore-row';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'lore-text';
  inp.placeholder = loreIdx + '行目';
  inp.value = val || '';

  const colorSel = makeSelect(COLOR_OPTIONS, colorVal || 'dark_purple');
  colorSel.className = 'lore-color-sel';

  const cbWrap = document.createElement('label');
  cbWrap.style.cssText = 'font-size: 12px; display: flex; align-items: center; gap: 3px; white-space: nowrap; color: var(--color-text-secondary); cursor: pointer;';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'lore-italic-cb';
  cb.checked = italicVal !== false;
  cbWrap.appendChild(cb);
  cbWrap.appendChild(document.createTextNode('斜体'));

  const del = document.createElement('button');
  del.textContent = '✕';
  del.style.cssText = 'font-size: 12px; padding: 4px 8px; color: var(--color-text-secondary);';
  del.onclick = () => row.remove();

  row.appendChild(inp);
  row.appendChild(colorSel);
  row.appendChild(cbWrap);
  row.appendChild(del);
  document.getElementById('lore-lines').appendChild(row);
}

document.getElementById('add-lore-btn').onclick = () => addLore('', 'dark_purple', true);

document.getElementById('copy-btn').onclick = () => {
  navigator.clipboard.writeText(document.getElementById('cmd-output').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'コピー完了!';
    setTimeout(() => btn.textContent = 'コピー', 1500);
  });
};

function escapeJson(s) {
  return s.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function generate() {
  const player = document.getElementById('player-input').value.trim();
  const item = document.getElementById('itemid').value.trim();

  if (!player) { showError('プレイヤー名を入力してください'); return; }
  if (!item) { showError('アイテムIDを入力してください'); return; }
  showError('');

  const count = parseInt(document.getElementById('count').value) || 1;
  const name = document.getElementById('itemname').value.trim();
  const nameItalic = document.getElementById('name-italic').checked;
  const nameColor = nameColorSel.value;

  const rows = document.querySelectorAll('.lore-row');
  const lores = [];
  rows.forEach(row => {
    const t = row.querySelector('.lore-text').value.trim();
    const c = row.querySelector('.lore-color-sel').value;
    const it = row.querySelector('.lore-italic-cb').checked;
    if (t) lores.push({ text: t, color: c, italic: it });
  });

  const components = [];
  if (name) {
    let obj = `{"text":"${escapeJson(name)}","italic":${nameItalic}`;
    if (nameColor) obj += `,"color":"${nameColor}"`;
    obj += '}';
    components.push(`custom_name='${obj}'`);
  }
  if (lores.length > 0) {
    const arr = lores.map(l => `'{"text":"${escapeJson(l.text)}","color":"${l.color}","italic":${l.italic}}'`).join(',');
    components.push(`lore=[${arr}]`);
  }

  const comp = components.length ? `[${components.join(',')}]` : '';
  document.getElementById('cmd-output').textContent = `/minecraft:give ${player} ${item}${comp} ${count}`;

  const prev = document.getElementById('mc-preview');
  prev.innerHTML = '';

  const nd = document.createElement('div');
  nd.style.cssText = `font-size:14px;font-weight:bold;font-style:${nameItalic?'italic':'normal'};color:${nameColor?MC_COLORS[nameColor]||'#fff':'#ffffff'};margin-bottom:4px;`;
  nd.textContent = name || item.replace(/^.*:/,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  prev.appendChild(nd);

  lores.forEach(l => {
    const ld = document.createElement('div');
    ld.style.cssText = `font-size:13px;color:${MC_COLORS[l.color]||'#AA00AA'};font-style:${l.italic?'italic':'normal'};`;
    ld.textContent = l.text;
    prev.appendChild(ld);
  });

  document.getElementById('output-area').style.display = 'block';
}
</script>
